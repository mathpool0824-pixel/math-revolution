<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회전체 시뮬레이션 - AI Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f0f4f8; font-family: 'Noto Sans KR', sans-serif; }
        
        /* --- 공통: 캔버스 및 패널 애니메이션 --- */
        #canvas-container { 
            position: absolute;
            top: 0;
            height: 100vh;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .panel {
            background: rgba(255, 255, 255, 0.90);
            backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            z-index: 20;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* --- 1. PC Mode (Split Layout) --- */
        body.pc-mode #canvas-container {
            right: 0;
            width: calc(100% - 340px); /* 패널 공간 확보 */
            left: auto;
        }
        body.pc-mode .panel {
            position: absolute;
            top: 1rem;
            left: 1rem;
            width: 20rem;
            max-height: 95vh;
            border-radius: 0.75rem;
            bottom: auto;
        }
        /* PC에서는 접기 버튼 숨김 (기본) */
        body.pc-mode #btnCollapse { display: none; }


        /* --- 2. Tablet Mode (Floating Layout) --- */
        body.tablet-mode #canvas-container {
            left: 0;
            width: 100vw; /* 전체 화면 */
            height: 100vh;
        }
        body.tablet-mode .panel {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            width: 18rem;
            max-height: 70vh; /* 적당한 높이 제한 */
            border-radius: 1rem;
        }
        /* 태블릿 패널 접힘: 높이만 줄어듬 (Window Shade) */
        body.tablet-mode .panel.collapsed {
            max-height: 3.5rem; /* 헤더만 보이게 */
            overflow: hidden;
        }


        /* --- 3. Mobile Mode (Bottom Sheet Layout) --- */
        body.mobile-mode #canvas-container {
            left: 0;
            width: 100vw;
            height: 100vh;
        }
        body.mobile-mode .panel {
            position: absolute;
            top: auto;
            bottom: 0;
            left: 0;
            width: 100%;
            max-height: 60vh;
            border-radius: 1.5rem 1.5rem 0 0;
            padding-bottom: 2rem; /* 하단 세이프 에어리어 */
        }
        /* 모바일 패널 접힘: 아래로 내려감 */
        body.mobile-mode .panel.collapsed {
            transform: translateY(calc(100% - 3.5rem));
        }


        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        
        #sectionCanvas {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            margin-top: 8px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pc-mode"> <!-- 기본 시작: PC 모드 -->

    <!-- UI Control Panel -->
    <div id="mainPanel" class="panel p-5 overflow-hidden">
        <!-- Panel Header -->
        <div class="flex justify-between items-center border-b pb-2 mb-2 flex-shrink-0 cursor-pointer" onclick="togglePanelCollapse()">
            <h1 class="text-xl font-bold text-gray-800 flex items-center gap-2 select-none">
                회전체 시뮬레이션 
                <span class="text-[10px] bg-gradient-to-r from-blue-500 to-purple-500 text-white px-1.5 py-0.5 rounded-full">AI Vision</span>
            </h1>
            <!-- Collapse Button (Tablet/Mobile Only) -->
            <button id="btnCollapse" class="text-gray-400 hover:text-gray-700 transition-transform duration-300">
                ▼
            </button>
        </div>
        
        <!-- Panel Content (Scrollable) -->
        <div class="overflow-y-auto flex-1 pr-1 space-y-4">
            
            <!-- 3-Way Mode Switcher -->
            <div class="flex bg-gray-100/50 p-1 rounded-lg border border-gray-200 gap-1">
                <button onclick="setDeviceMode('pc')" id="btnModePC" class="flex-1 px-2 py-1.5 text-[11px] font-bold rounded bg-indigo-600 text-white shadow-sm transition-colors flex items-center justify-center gap-1">
                    🖥️ PC
                </button>
                <button onclick="setDeviceMode('tablet')" id="btnModeTablet" class="flex-1 px-2 py-1.5 text-[11px] font-bold rounded hover:bg-gray-200 text-gray-500 transition-colors flex items-center justify-center gap-1">
                    📱 Tab
                </button>
                <button onclick="setDeviceMode('mobile')" id="btnModeMobile" class="flex-1 px-2 py-1.5 text-[11px] font-bold rounded hover:bg-gray-200 text-gray-500 transition-colors flex items-center justify-center gap-1">
                    📱 Mob
                </button>
            </div>

            <!-- Gemini AI Generation (Image Upload Added) -->
            <div class="space-y-2 bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                <label class="text-sm font-bold text-indigo-800 flex items-center gap-1">
                    ✨ AI 도형 생성기
                </label>
                <div class="flex gap-2 items-center">
                    <!-- Image Upload -->
                    <div class="relative">
                        <input type="file" id="imgUpload" accept="image/*" class="hidden" onchange="handleImageUpload(this)">
                        <label for="imgUpload" class="cursor-pointer flex items-center justify-center w-8 h-8 rounded bg-white border border-gray-300 hover:border-indigo-500 text-gray-500 hover:text-indigo-600 transition-colors" title="사진 업로드">
                            📷
                        </label>
                        <!-- Image Preview Badge -->
                        <div id="imgPreviewBadge" class="hidden absolute -top-1 -right-1 w-3 h-3 bg-green-500 rounded-full border border-white"></div>
                    </div>

                    <!-- Image Preview Thumbnail (Initially Hidden) -->
                    <div id="imgPreviewContainer" class="hidden relative w-8 h-8 rounded overflow-hidden border border-indigo-300 group">
                        <img id="imgPreview" class="w-full h-full object-cover">
                        <button onclick="clearImage()" class="absolute inset-0 bg-black/60 text-white text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity font-bold">
                            ✕
                        </button>
                    </div>

                    <input type="text" id="aiPrompt" placeholder="예: 와인잔, 사진 속 물체" 
                           class="w-full text-sm border border-gray-300 rounded px-2 py-1 focus:outline-none focus:border-indigo-500 bg-white"
                           onkeypress="if(event.key === 'Enter') generateShapeWithGemini()">
                    <button onclick="generateShapeWithGemini()" id="btnGenerate" class="bg-indigo-600 hover:bg-indigo-700 text-white p-2 rounded transition flex-shrink-0 shadow-sm">
                        <span id="genBtnText">✨</span>
                    </button>
                </div>
                <p class="text-[10px] text-indigo-400">사진을 올리거나 물체 이름을 입력하세요.</p>
            </div>

            <!-- Wireframe Option -->
            <div class="flex items-center justify-end px-1">
                 <input type="checkbox" id="wireframeCheck" class="w-4 h-4 text-blue-600 bg-gray-100 border-gray-300 rounded focus:ring-blue-500 cursor-pointer">
                 <label for="wireframeCheck" class="ml-2 text-xs font-bold text-gray-600 cursor-pointer hover:text-blue-600 transition-colors">와이어프레임 보기</label>
            </div>

            <!-- Shape Selection -->
            <div class="space-y-2">
                <label class="text-sm font-semibold text-gray-600">기본 도형 선택</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setShape('rect')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 py-2 rounded text-sm transition font-medium">직사각형</button>
                    <button onclick="setShape('triangle')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 py-2 rounded text-sm transition font-medium">삼각형</button>
                    <button onclick="setShape('semicircle')" class="bg-blue-100 hover:bg-blue-200 text-blue-800 py-2 rounded text-sm transition font-medium">반원</button>
                </div>
                <button id="drawModeBtn" onclick="toggleDrawMode()" class="w-full bg-gray-600 hover:bg-gray-700 text-white py-2 rounded text-sm transition font-bold mt-2 shadow-sm">
                    ✏️ 직접 그리기 모드
                </button>
                
                <!-- Draw Options -->
                <div id="drawTypeControls" class="hidden flex flex-col gap-2 bg-gray-50 p-3 rounded mt-1 mb-2 border border-gray-100">
                    <span class="text-xs font-bold text-gray-500 mb-1 block">그리기 방식 선택</span>
                    <div class="flex justify-between gap-1 text-xs font-medium text-gray-700">
                        <label class="flex items-center cursor-pointer hover:text-indigo-600 bg-white px-2 py-1 rounded border border-gray-200 shadow-sm flex-1 justify-center">
                            <input type="radio" name="drawType" value="linear" checked class="mr-1 accent-indigo-600" onchange="setDrawType('linear')">
                            직선
                        </label>
                        <label class="flex items-center cursor-pointer hover:text-indigo-600 bg-white px-2 py-1 rounded border border-gray-200 shadow-sm flex-1 justify-center">
                            <input type="radio" name="drawType" value="curve" class="mr-1 accent-indigo-600" onchange="setDrawType('curve')">
                            자동 곡선
                        </label>
                        <label class="flex items-center cursor-pointer hover:text-indigo-600 bg-white px-2 py-1 rounded border border-gray-200 shadow-sm flex-1 justify-center">
                            <input type="radio" name="drawType" value="freehand" class="mr-1 accent-indigo-600" onchange="setDrawType('freehand')">
                            자유선
                        </label>
                    </div>
                    <p id="drawHint" class="text-[10px] text-gray-400 text-center mt-1">
                        점을 클릭하여 직선으로 연결합니다.
                    </p>
                </div>

                <div id="drawInstructions" class="hidden text-xs text-red-600 bg-red-50 p-2 rounded border border-red-100">
                    화면 왼쪽(X < 0) 영역에 도형을 그리세요.<br>
                    <b>[도형 생성]</b>을 눌러 완료합니다.
                </div>
                <div id="drawControls" class="hidden grid grid-cols-2 gap-2">
                    <button onclick="clearDrawing()" class="bg-gray-200 text-gray-700 py-1 rounded text-xs">초기화</button>
                    <button onclick="finishDrawing()" class="bg-green-600 text-white py-1 rounded text-xs font-bold shadow-sm">도형 생성</button>
                </div>
            </div>

            <hr class="border-gray-200">

            <!-- Animation Control -->
            <div class="space-y-1">
                <div class="flex justify-between items-center mb-1">
                    <label class="text-sm font-semibold text-gray-600">회전 각도</label>
                    <button onclick="animateRevolution()" class="text-xs bg-red-600 text-white px-3 py-1.5 rounded hover:bg-red-700 font-bold shadow-sm transition-colors ring-1 ring-red-500 ring-offset-1">
                        ▶ 다시 회전
                    </button>
                </div>
                <input type="range" id="angleSlider" min="0" max="360" value="360" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>

            <!-- Slice View Controls -->
            <div class="space-y-3 pt-2">
                <label class="text-sm font-semibold text-gray-600 block border-b pb-1">단면 자르기 & 뷰어</label>
                <div class="flex flex-col gap-2">
                    <button onclick="setSliceMode('none')" id="btnSliceNone" class="bg-gray-800 text-white py-2 rounded text-sm transition font-medium ring-2 ring-offset-1 ring-gray-800 shadow-sm">
                        전체 보기 (자르기 없음)
                    </button>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setSliceMode('horizontal')" id="btnSliceHoriz" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 rounded text-xs transition shadow-sm">
                            가로 자르기
                        </button>
                        <button onclick="setSliceMode('vertical')" id="btnSliceVert" class="bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 rounded text-xs transition shadow-sm">
                            세로 자르기
                        </button>
                    </div>
                </div>

                <div class="text-center">
                    <label class="text-xs text-gray-500 font-bold block text-left">현재 단면 모습 (2D)</label>
                    <canvas id="sectionCanvas" width="280" height="180"></canvas>
                </div>
            </div>
            
            <div class="h-6 md:hidden"></div>
        </div>
    </div>
    
    <!-- AI Explanation Modal -->
    <div id="explanationModal" class="hidden absolute bottom-4 left-4 w-80 bg-white/95 backdrop-blur rounded-xl p-4 shadow-xl border border-purple-100 z-50 max-h-[40vh] overflow-y-auto">
        <div class="flex justify-between items-start mb-2">
            <h3 class="font-bold text-purple-800 text-sm">🧠 AI 분석 결과</h3>
            <button onclick="document.getElementById('explanationModal').classList.add('hidden')" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div id="explanationContent" class="text-xs text-gray-700 leading-relaxed markdown-body"></div>
    </div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script>
        // --- Gemini API ---
        const apiKey = ""; 
        let selectedImageBase64 = null;
        let selectedImageMimeType = null;

        // Image Handling
        function handleImageUpload(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64String = e.target.result;
                // Store raw base64 without prefix for API
                selectedImageBase64 = base64String.split(',')[1];
                selectedImageMimeType = file.type;

                // Show preview
                const img = document.getElementById('imgPreview');
                img.src = base64String;
                
                document.getElementById('imgPreviewContainer').classList.remove('hidden');
                document.getElementById('imgPreviewBadge').classList.remove('hidden');
                
                // Hide prompt placeholder if empty
                const promptInput = document.getElementById('aiPrompt');
                if(!promptInput.value) promptInput.placeholder = "사진 속 물체를 분석합니다...";
            };
            reader.readAsDataURL(file);
        }

        function clearImage() {
            selectedImageBase64 = null;
            selectedImageMimeType = null;
            document.getElementById('imgUpload').value = '';
            document.getElementById('imgPreviewContainer').classList.add('hidden');
            document.getElementById('imgPreviewBadge').classList.add('hidden');
            document.getElementById('aiPrompt').placeholder = "예: 와인잔, 사진 속 물체";
        }
        
        async function callGemini(prompt, imageData = null) {
            const parts = [{ text: prompt }];
            
            if (imageData) {
                parts.push({
                    inlineData: {
                        mimeType: selectedImageMimeType || "image/jpeg",
                        data: imageData
                    }
                });
            }

            const payload = { contents: [{ role: "user", parts: parts }] };
            // 현재 환경에서 호환되는 지원 모델로 변경
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const delays = [1000, 2000, 4000, 8000, 16000];

            for (let i = 0; i <= delays.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        const errText = await response.text();
                        console.error("API Error Details:", errText);
                        throw new Error(`API Error: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (error) {
                    if (i === delays.length) {
                        alert("AI 연결 오류. 잠시 후 다시 시도해주세요.\n(API 키가 유효한지 확인해주세요.)");
                        return null;
                    }
                    await new Promise(resolve => setTimeout(resolve, delays[i]));
                }
            }
        }

        async function generateShapeWithGemini() {
            const userInput = document.getElementById('aiPrompt').value.trim();
            const hasImage = !!selectedImageBase64;

            if (!userInput && !hasImage) return alert("만들고 싶은 도형 이름을 입력하거나 사진을 업로드하세요!");

            const btn = document.getElementById('btnGenerate');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;

            let prompt = "";
            
            if (hasImage) {
                prompt = `
                    Analyze the attached image. The user wants to create a 3D solid of revolution representing the main object in this image.
                    
                    User Instruction: "${userInput || 'Create the shape of the object in the image.'}"

                    Task: 
                    1. Identify the main object's outer profile (silhouette).
                    2. Generate a JSON array of 2D coordinates (x, y) that represent the RIGHT-HALF profile of this object (where x >= 0) to be rotated around the Y-axis.
                    
                    Constraints: 
                    - X must be >= 0 (Radius).
                    - Y should be roughly between -8 and 8 (Height).
                    - The points should form a continuous path.
                    - Provide 15-30 points for a smooth curve.
                    
                    Output ONLY raw JSON array. Do not include markdown formatting like \`\`\`json.
                    Example: [{"x":0,"y":-5},{"x":3,"y":0},{"x":0,"y":5}]
                `;
            } else {
                prompt = `
                    Generate a JSON array of 2D coordinates (x, y) for a solid of revolution profile of: "${userInput}".
                    Create the RIGHT-HALF profile (x >= 0).
                    Constraints: x >= 0, Y roughly -8 to 8. Continuous path. 10-30 points.
                    Output ONLY raw JSON array. Do not include markdown formatting like \`\`\`json.
                    Example: [{"x":0,"y":-5},{"x":3,"y":0},{"x":0,"y":5}]
                `;
            }

            const resultText = await callGemini(prompt, selectedImageBase64);
            
            btn.innerHTML = originalContent;
            btn.disabled = false;

            if (resultText) {
                try {
                    // 더 강력한 JSON 추출 정규식 사용 (AI가 텍스트를 섞어 보내도 배열만 추출)
                    const jsonMatch = resultText.match(/\[\s*\{[\s\S]*\}\s*\]/);
                    if (!jsonMatch) throw new Error("JSON 배열을 찾을 수 없습니다.");
                    
                    const pointsData = JSON.parse(jsonMatch[0]);
                    
                    if (Array.isArray(pointsData) && pointsData.length > 1) {
                        if(isDrawMode) toggleDrawMode();
                        currentPoints = pointsData.map(p => new THREE.Vector2(Math.abs(p.x), p.y));
                        document.getElementById('angleSlider').value = 0;
                        setSliceMode('none');
                        animateRevolution();
                        document.getElementById('explanationModal').classList.add('hidden');
                    } else {
                        alert("유효한 도형 데이터를 생성하지 못했습니다.");
                    }
                } catch (e) { 
                    console.error("Parse Error:", e, resultText);
                    alert("도형 데이터 해석 실패. 다시 시도해주세요. (단어를 조금 바꿔서 입력해보세요)"); 
                }
            }
        }

        async function explainShapeWithGemini() {
            if (!currentPoints.length) return alert("도형이 없습니다.");
            
            const btn = document.getElementById('btnExplain');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<div class="spinner" style="width:12px;height:12px;border-width:2px;"></div> 분석 중...';
            btn.disabled = true;

            const pointsSummary = currentPoints.map(p => `(${p.x.toFixed(1)}, ${p.y.toFixed(1)})`).join(', ');
            const prompt = `
                Analyze this solid of revolution profile. Points: [${pointsSummary}]
                1. What shape is this? 2. Geometric properties? 3. Real-world example?
                Respond in Korean (한국어). Concise.
            `;

            // 분석 함수도 새로운 모델 주소를 사용하도록 callGemini 호출
            const explanation = await callGemini(prompt);
            btn.innerHTML = originalText;
            btn.disabled = false;
            
            if (explanation) {
                document.getElementById('explanationContent').innerHTML = marked.parse(explanation);
                document.getElementById('explanationModal').classList.remove('hidden');
            }
        }

        // --- Device Mode Logic ---
        function setDeviceMode(mode) {
            const body = document.body;
            const btnPC = document.getElementById('btnModePC');
            const btnTablet = document.getElementById('btnModeTablet');
            const btnMobile = document.getElementById('btnModeMobile');
            
            // 1. Reset Classes
            body.classList.remove('pc-mode', 'tablet-mode', 'mobile-mode');
            
            // 2. Add Active Class
            body.classList.add(`${mode}-mode`);
            
            // 3. Reset Button Styles (Gray)
            const inactiveClass = "flex-1 px-2 py-1.5 text-[11px] font-bold rounded hover:bg-gray-200 text-gray-500 transition-colors flex items-center justify-center gap-1";
            const activeClass = "flex-1 px-2 py-1.5 text-[11px] font-bold rounded bg-indigo-600 text-white shadow-sm transition-colors flex items-center justify-center gap-1";
            
            btnPC.className = inactiveClass;
            btnTablet.className = inactiveClass;
            btnMobile.className = inactiveClass;

            // 4. Set Active Button
            if (mode === 'pc') btnPC.className = activeClass;
            else if (mode === 'tablet') btnTablet.className = activeClass;
            else if (mode === 'mobile') btnMobile.className = activeClass;
            
            // 5. Reset Panel State
            const panel = document.getElementById('mainPanel');
            const collapseBtn = document.getElementById('btnCollapse');
            panel.classList.remove('collapsed'); // Expand panel on switch
            collapseBtn.style.transform = 'rotate(0deg)';

            // Trigger resize
            setTimeout(onWindowResize, 450);
        }
        
        function togglePanelCollapse() {
            // PC mode is usually fixed, but Tablet/Mobile is collapsible
            if (document.body.classList.contains('pc-mode')) return;

            const panel = document.getElementById('mainPanel');
            const btn = document.getElementById('btnCollapse');
            panel.classList.toggle('collapsed');
            
            if (panel.classList.contains('collapsed')) {
                btn.style.transform = 'rotate(180deg)';
            } else {
                btn.style.transform = 'rotate(0deg)';
            }
        }

        // Auto Collapse for Mobile/Tablet on Interaction
        function autoCollapsePanel() {
            if (document.body.classList.contains('mobile-mode')) {
                const panel = document.getElementById('mainPanel');
                const btn = document.getElementById('btnCollapse');
                if (!panel.classList.contains('collapsed')) {
                    panel.classList.add('collapsed');
                    btn.style.transform = 'rotate(180deg)';
                }
            }
            // Tablet users might prefer it open, so we only auto-collapse mobile
        }

        // --- Basic Setup ---
        let scene, camera, renderer, controls;
        let mainMesh, axisHelper;
        let raycaster, mouse, planeMesh;
        
        let currentPoints = []; 
        let isDrawMode = false;
        let drawType = 'linear'; 
        let isDrawingDrag = false; 
        let drawingPoints = []; 
        let drawingLine;
        let drawingMarkers = [];
        let revolutionAnimFrameId = null;
        let currentSliceMode = 'none';

        const COLOR_MESH = 0x3b82f6; 
        const COLOR_DRAW = 0xea580c; 
        const COLOR_SECTION_FILL = "#93c5fd"; 
        const COLOR_SECTION_STROKE = "#1e40af"; 

        const clipPlanes = [
            new THREE.Plane(new THREE.Vector3(0, -1, 0), 0), 
            new THREE.Plane(new THREE.Vector3(0, 0, -1), 0)
        ];

        init();
        setShape('rect'); 
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f4f8);

            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;

            camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
            camera.position.set(25, 20, 25);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(width, height);
            renderer.localClippingEnabled = true; 
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
            dirLight.position.set(10, 20, 10);
            dirLight.castShadow = true;
            scene.add(dirLight);
            
            const axisGeo = new THREE.CylinderGeometry(0.05, 0.05, 40, 8);
            const axisMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: 0.4 });
            axisHelper = new THREE.Mesh(axisGeo, axisMat);
            scene.add(axisHelper);

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            planeMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100), 
                new THREE.MeshBasicMaterial({ visible: false })
            );
            scene.add(planeMesh);
            
            window.addEventListener('resize', onWindowResize);
            
            const canvasEl = document.getElementById('canvas-container');
            canvasEl.addEventListener('mousedown', onMouseDown);
            canvasEl.addEventListener('mousemove', onMouseMove);
            canvasEl.addEventListener('mouseup', onMouseUp);
            
            canvasEl.addEventListener('touchstart', onTouchStart, {passive: false});
            canvasEl.addEventListener('touchmove', onTouchMove, {passive: false});
            canvasEl.addEventListener('touchend', onTouchEnd, {passive: false});


            document.getElementById('angleSlider').addEventListener('input', () => {
                if(revolutionAnimFrameId) cancelAnimationFrame(revolutionAnimFrameId);
                updateMeshGeometry();
            });
            document.getElementById('wireframeCheck').addEventListener('change', updateMaterial);
        }

        // --- Logic ---

        function setShape(type) {
            if(isDrawMode) toggleDrawMode();
            document.getElementById('explanationModal').classList.add('hidden');

            currentPoints = [];
            const width = 4;
            const height = 6;

            if (type === 'rect') {
                currentPoints.push(new THREE.Vector2(0, -height/2));
                currentPoints.push(new THREE.Vector2(width, -height/2));
                currentPoints.push(new THREE.Vector2(width, height/2));
                currentPoints.push(new THREE.Vector2(0, height/2));
                currentPoints.push(new THREE.Vector2(0, -height/2)); 
            } else if (type === 'triangle') {
                currentPoints.push(new THREE.Vector2(0, height/2));
                currentPoints.push(new THREE.Vector2(width, -height/2));
                currentPoints.push(new THREE.Vector2(0, -height/2));
                currentPoints.push(new THREE.Vector2(0, height/2));
            } else if (type === 'semicircle') {
                const radius = 3;
                const segments = 32;
                for (let i = 0; i <= segments; i++) {
                    const theta = (i / segments) * Math.PI;
                    const x = radius * Math.sin(theta);
                    const y = radius * Math.cos(theta); 
                    currentPoints.push(new THREE.Vector2(x, -y)); 
                }
                currentPoints.push(new THREE.Vector2(0, radius));
                currentPoints.push(new THREE.Vector2(0, -radius));
            }
            animateRevolution();
        }

        function setSliceMode(mode) {
            currentSliceMode = mode;
            const btnNone = document.getElementById('btnSliceNone');
            const btnHoriz = document.getElementById('btnSliceHoriz');
            const btnVert = document.getElementById('btnSliceVert');
            
            [btnNone, btnHoriz, btnVert].forEach(b => {
                b.className = "bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-2 rounded text-xs transition";
            });
            if (mode === 'none') btnNone.className = "bg-gray-800 text-white py-2 rounded text-sm transition font-medium ring-2 ring-offset-1 ring-gray-800 shadow-sm";
            else if (mode === 'horizontal') btnHoriz.className = "bg-blue-600 text-white py-2 rounded text-xs transition font-bold ring-2 ring-offset-1 ring-blue-600 shadow-sm";
            else if (mode === 'vertical') btnVert.className = "bg-blue-600 text-white py-2 rounded text-xs transition font-bold ring-2 ring-offset-1 ring-blue-600 shadow-sm";

            updateMeshGeometry(); 
        }

        function animateRevolution() {
            if(revolutionAnimFrameId) cancelAnimationFrame(revolutionAnimFrameId);
            
            autoCollapsePanel();

            const slider = document.getElementById('angleSlider');
            let currentAngle = 0;
            slider.value = 0;
            updateMeshGeometry(); 
            const speed = 4;
            function step() {
                currentAngle += speed;
                if (currentAngle >= 360) {
                    currentAngle = 360;
                    slider.value = currentAngle;
                    updateMeshGeometry();
                    revolutionAnimFrameId = null;
                    return;
                }
                slider.value = currentAngle;
                updateMeshGeometry();
                revolutionAnimFrameId = requestAnimationFrame(step);
            }
            revolutionAnimFrameId = requestAnimationFrame(step);
        }

        function updateMeshGeometry() {
            if (!currentPoints || currentPoints.length === 0) return;
            if (mainMesh) { scene.remove(mainMesh); mainMesh.geometry.dispose(); }
            
            const angleDeg = document.getElementById('angleSlider').value;
            const angleRad = (angleDeg * (Math.PI / 180));
            const effectiveAngle = Math.max(angleRad, 0.0001); 
            const geometry = new THREE.LatheGeometry(currentPoints, 48, 0, effectiveAngle);
            
            let activePlanes = [];
            if (currentSliceMode === 'horizontal') activePlanes = [clipPlanes[0]];
            else if (currentSliceMode === 'vertical') activePlanes = [clipPlanes[1]];

            const material = new THREE.MeshPhysicalMaterial({
                color: COLOR_MESH,
                side: THREE.DoubleSide, 
                metalness: 0.2,
                roughness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.1,
                clippingPlanes: activePlanes,
                clipShadows: true,
                wireframe: document.getElementById('wireframeCheck').checked,
                transparent: false,
                opacity: 1.0,
                depthWrite: true
            });

            mainMesh = new THREE.Mesh(geometry, material);
            mainMesh.castShadow = true;
            mainMesh.receiveShadow = true;
            scene.add(mainMesh);
            drawSectionOnCanvas();
        }

        function updateMaterial() {
            if(mainMesh) mainMesh.material.wireframe = document.getElementById('wireframeCheck').checked;
        }

        function drawSectionOnCanvas() {
            const canvas = document.getElementById('sectionCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;
            const padding = 30; // 여백 추가

            // 캔버스 초기화
            ctx.clearRect(0, 0, w, h);
            ctx.fillStyle = "#f8fafc";
            ctx.fillRect(0,0,w,h);

            // 십자선 (중심 표시) - 연하게
            ctx.strokeStyle = "#e2e8f0";
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, h/2); ctx.lineTo(w, h/2);
            ctx.moveTo(w/2, 0); ctx.lineTo(w/2, h);
            ctx.stroke();

            // '전체 보기' 모드일 때
            if (currentSliceMode === 'none') {
                ctx.fillStyle = "#94a3b8";
                ctx.font = "12px 'Noto Sans KR', sans-serif";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("전체 보기 모드입니다", w/2, h/2);
                ctx.font = "10px 'Noto Sans KR', sans-serif";
                ctx.fillText("(단면을 자르면 이곳에 표시됩니다)", w/2, h/2 + 16);
                return;
            }

            if (!currentPoints || currentPoints.length === 0) return;

            // --- 자동 스케일링 로직 ---
            let scale = 1;
            
            if (currentSliceMode === 'vertical') {
                // --- 세로 단면 (회전축 포함 평면) ---
                // Y축을 기준으로 좌우 대칭인 단면을 그립니다.
                
                // 1. 단면의 범위(Bounding Box) 계산
                let minX = 0; // 중심축이 0
                let maxX = 0;
                let minY = Infinity;
                let maxY = -Infinity;

                currentPoints.forEach(p => {
                    if (p.x > maxX) maxX = p.x;
                    if (p.y < minY) minY = p.y;
                    if (p.y > maxY) maxY = p.y;
                });

                if (minY === Infinity) return; // 유효한 점 없음

                // 2. 화면에 맞추기 위한 스케일 계산
                const shapeWidth = maxX * 2; // 좌우 대칭이므로 최대 반지름 * 2
                const shapeHeight = maxY - minY;
                
                // 가로/세로 비율에 맞춰 더 작은 쪽을 기준으로 스케일 설정 (Fit)
                const scaleX = (w - padding) / shapeWidth;
                const scaleY = (h - padding) / shapeHeight;
                scale = Math.min(scaleX, scaleY);

                // 3. 중심점 보정 (도형의 중심을 캔버스 중심으로)
                const shapeCenterY = (minY + maxY) / 2;

                // 4. 그리기
                ctx.fillStyle = COLOR_SECTION_FILL;
                ctx.strokeStyle = COLOR_SECTION_STROKE;
                ctx.lineWidth = 2;

                ctx.beginPath();
                // 오른쪽 경로 (Original Points)
                currentPoints.forEach((p, i) => {
                    const canvasX = w/2 + p.x * scale;
                    // Y축 반전 주의 (Canvas는 아래가 +) + 중심 보정
                    const canvasY = h/2 - (p.y - shapeCenterY) * scale;
                    
                    if (i === 0) ctx.moveTo(canvasX, canvasY);
                    else ctx.lineTo(canvasX, canvasY);
                });
                
                // 왼쪽 경로 (Mirrored Points) - 역순으로 그려서 닫힌 도형 만들기
                for (let i = currentPoints.length - 1; i >= 0; i--) {
                    const p = currentPoints[i];
                    const canvasX = w/2 - p.x * scale; // X 대칭
                    const canvasY = h/2 - (p.y - shapeCenterY) * scale;
                    ctx.lineTo(canvasX, canvasY);
                }
                
                ctx.closePath();
                ctx.fill();
                ctx.stroke();

            } else if (currentSliceMode === 'horizontal') {
                // --- 가로 단면 (Y=0 평면) ---
                const radii = getRadiiAtY(0);

                if (radii.length > 0) {
                    radii.sort((a, b) => a - b); // 작은 반지름 -> 큰 반지름 정렬
                    const maxR = radii[radii.length - 1]; // 가장 큰 반지름 (외경)

                    // 1. 스케일 계산 (원형이므로 정사각형 영역 Fit)
                    const shapeSize = maxR * 2;
                    scale = (Math.min(w, h) - padding) / shapeSize;

                    // 2. 그리기 (동심원)
                    ctx.fillStyle = COLOR_SECTION_FILL;
                    ctx.strokeStyle = COLOR_SECTION_STROKE;
                    ctx.lineWidth = 2;

                    // 큰 원부터 그리고, 작은 원으로 구멍 뚫는 식 (Even-Odd Rule or Layering)
                    // 예: 도넛 -> 큰원(파랑) -> 작은원(흰색)
                    
                    for (let i = radii.length - 1; i >= 0; i--) {
                        ctx.beginPath();
                        ctx.arc(w/2, h/2, radii[i] * scale, 0, Math.PI * 2);
                        
                        // 가장 바깥쪽(마지막)부터: 채움 -> 구멍 -> 채움 -> 구멍 순서
                        // radii 배열은 오름차순. 뒤에서부터 순회.
                        // (radii.length - 1 - i) 가 0(가장바깥), 1(그다음), 2...
                        if ((radii.length - 1 - i) % 2 === 0) {
                            ctx.fillStyle = COLOR_SECTION_FILL;
                        } else {
                            ctx.fillStyle = "#f8fafc"; // 배경색으로 덮어서 구멍 표현
                        }
                        
                        ctx.fill();
                        ctx.stroke();
                    }

                } else {
                    ctx.fillStyle = "#94a3b8";
                    ctx.textAlign = "center";
                    ctx.textBaseline = "middle";
                    ctx.font = "12px 'Noto Sans KR', sans-serif";
                    ctx.fillText("이 높이(Y=0)에는 단면이 없습니다.", w/2, h/2);
                }
            }
        }

        function getRadiiAtY(targetY) {
            const radii = [];
            for (let i = 0; i < currentPoints.length; i++) {
                const p1 = currentPoints[i];
                const p2 = currentPoints[(i + 1) % currentPoints.length];
                if ((p1.y <= targetY && p2.y > targetY) || (p1.y > targetY && p2.y <= targetY)) {
                    const t = (targetY - p1.y) / (p2.y - p1.y);
                    const x = p1.x + t * (p2.x - p1.x);
                    radii.push(Math.abs(x));
                }
                if (Math.abs(p1.y - targetY) < 0.001 && Math.abs(p2.y - targetY) < 0.001) {
                   radii.push(Math.abs(p1.x));
                   radii.push(Math.abs(p2.x));
                }
            }
            return [...new Set(radii)];
        }

        // --- 4. Drawing & Utils ---

        function setDrawType(type) {
            drawType = type;
            const hint = document.getElementById('drawHint');
            if(type === 'linear') hint.innerText = '점을 클릭하여 직선으로 연결합니다.';
            else if(type === 'curve') hint.innerText = '드래그 후 놓으면 원형 호(Arc)로 자동 변환됩니다.';
            else if(type === 'freehand') hint.innerText = '마우스 움직임 그대로 자유롭게 그립니다.';
        }

        function toggleDrawMode() {
            isDrawMode = !isDrawMode;
            const btn = document.getElementById('drawModeBtn');
            const instructions = document.getElementById('drawInstructions');
            const controlsDiv = document.getElementById('drawControls');
            const typeControls = document.getElementById('drawTypeControls');
            document.getElementById('explanationModal').classList.add('hidden');

            if (isDrawMode) {
                // RESET LOGIC
                if(mainMesh) {
                    scene.remove(mainMesh);
                    mainMesh.geometry.dispose();
                    mainMesh = null;
                }
                currentPoints = [];
                
                setSliceMode('none'); 
                moveCameraToFront();
                clearDrawing();

                btn.classList.replace('bg-gray-600', 'bg-red-500');
                btn.innerText = '❌ 그리기 취소';
                instructions.classList.remove('hidden');
                controlsDiv.classList.remove('hidden');
                typeControls.classList.remove('hidden');
                controls.enabled = false;
            } else {
                btn.classList.replace('bg-red-500', 'bg-gray-600');
                btn.innerText = '✏️ 직접 그리기 모드';
                instructions.classList.add('hidden');
                controlsDiv.classList.add('hidden');
                typeControls.classList.add('hidden');
                controls.enabled = true;
                clearDrawing();
            }
        }

        function moveCameraToFront() {
            const targetPos = new THREE.Vector3(0, 0, 35);
            const duration = 800;
            const startPos = camera.position.clone();
            const startTime = Date.now();
            function animateCam() {
                const now = Date.now();
                const progress = Math.min((now - startTime) / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 3);
                camera.position.lerpVectors(startPos, targetPos, ease);
                camera.lookAt(0,0,0);
                if (progress < 1 && isDrawMode) requestAnimationFrame(animateCam);
            }
            animateCam();
        }

        function getMousePoint(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(planeMesh);
            if (intersects.length > 0) {
                const pt = intersects[0].point;
                // Snap only for Linear
                if (drawType === 'linear') {
                    pt.x = Math.round(pt.x * 2) / 2;
                    pt.y = Math.round(pt.y * 2) / 2;
                }
                pt.z = 0;
                return pt;
            }
            return null;
        }

        // Mouse Events
        function onMouseDown(event) { handleInputStart(event.clientX, event.clientY); }
        function onMouseMove(event) { handleInputMove(event.clientX, event.clientY); }
        function onMouseUp(event) { handleInputEnd(); }

        // Touch Events
        function onTouchStart(event) { 
            if(!isDrawMode) return;
            event.preventDefault(); // Prevent scrolling
            handleInputStart(event.touches[0].clientX, event.touches[0].clientY); 
        }
        function onTouchMove(event) { 
            if(!isDrawMode) return;
            event.preventDefault();
            handleInputMove(event.touches[0].clientX, event.touches[0].clientY); 
        }
        function onTouchEnd(event) { 
            if(!isDrawMode) return;
            event.preventDefault();
            handleInputEnd(); 
        }

        function handleInputStart(x, y) {
            if (!isDrawMode) return;
            const pt = getMousePoint(x, y);
            if (!pt) return;
            if (pt.x > 0) return; 

            if (drawType === 'curve' || drawType === 'freehand') {
                isDrawingDrag = true;
                addPoint(pt); 
            } else {
                addPoint(pt);
            }
        }

        function handleInputMove(x, y) {
            if (!isDrawMode) return;
            if ((drawType === 'curve' || drawType === 'freehand') && isDrawingDrag) {
                const pt = getMousePoint(x, y);
                if (!pt || pt.x > 0) return;
                
                const lastPt = drawingPoints[drawingPoints.length - 1];
                if (!lastPt || pt.distanceTo(lastPt) > 0.1) {
                    addPoint(pt);
                }
            }
        }

        function handleInputEnd() {
            if (!isDrawMode) return;
            if (isDrawingDrag) {
                isDrawingDrag = false;
                if (drawType === 'curve') {
                    smoothCurvePoints();
                }
            }
        }

        // --- Auto-Arc Logic ---
        function smoothCurvePoints() {
            if (drawingPoints.length < 3) return; 

            const p1 = drawingPoints[0];
            const p3 = drawingPoints[drawingPoints.length - 1];

            // Find point p2 furthest from line p1-p3
            let maxDist = 0;
            let p2Index = -1;
            const A = p1.y - p3.y;
            const B = p3.x - p1.x;
            const C = p1.x * p3.y - p3.x * p1.y;
            const denom = Math.sqrt(A*A + B*B);

            if (denom < 0.0001) {
                 drawingLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(drawingPoints), new THREE.LineBasicMaterial({ color: COLOR_DRAW, linewidth: 3 }));
                 scene.add(drawingLine);
                 return;
            }

            for (let i = 1; i < drawingPoints.length - 1; i++) {
                const p = drawingPoints[i];
                const dist = Math.abs(A * p.x + B * p.y + C) / denom;
                if (dist > maxDist) {
                    maxDist = dist;
                    p2Index = i;
                }
            }

            // Threshold for straight line
            if (maxDist < 0.5 || p2Index === -1) {
                drawingPoints = [p1, p3]; // Just a line
            } else {
                const p2 = drawingPoints[p2Index];
                const centerData = getCircleCenter(p1, p2, p3);
                
                if (!centerData) {
                    drawingPoints = [p1, p3];
                } else {
                    const radius = centerData.dist;
                    const c = centerData.pos;

                    const startAngle = Math.atan2(p1.y - c.y, p1.x - c.x);
                    const endAngle = Math.atan2(p3.y - c.y, p3.x - c.x);
                    
                    const crossZ = (p2.x - p1.x) * (p3.y - p2.y) - (p2.y - p1.y) * (p3.x - p2.x);
                    const clockwise = crossZ < 0; 
                    
                    const curve = new THREE.EllipseCurve(
                        c.x, c.y,
                        radius, radius,
                        startAngle, endAngle,
                        clockwise,
                        0
                    );
                    drawingPoints = curve.getPoints(50).map(v => new THREE.Vector3(v.x, v.y, 0));
                }
            }
            
            // Redraw
            if (drawingLine) { scene.remove(drawingLine); drawingLine.geometry.dispose(); }
            drawingLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(drawingPoints), new THREE.LineBasicMaterial({ color: COLOR_DRAW, linewidth: 3 }));
            scene.add(drawingLine);
        }

        function getCircleCenter(p1, p2, p3) {
            const x1 = p1.x, y1 = p1.y;
            const x2 = p2.x, y2 = p2.y;
            const x3 = p3.x, y3 = p3.y;
            
            const D = 2 * (x1 * (y2 - y3) + x2 * (y3 - y1) + x3 * (y1 - y2));
            if (Math.abs(D) < 0.0001) return null; 
            
            const Ux = ((x1*x1 + y1*y1) * (y2 - y3) + (x2*x2 + y2*y2) * (y3 - y1) + (x3*x3 + y3*y3) * (y1 - y2)) / D;
            const Uy = ((x1*x1 + y1*y1) * (x3 - x2) + (x2*x2 + y2*y2) * (x1 - x3) + (x3*x3 + y3*y3) * (x2 - x1)) / D;
            
            const dx = x1 - Ux;
            const dy = y1 - Uy;
            const R = Math.sqrt(dx*dx + dy*dy);
            
            return { pos: {x: Ux, y: Uy}, dist: R };
        }

        function addPoint(pt) {
            drawingPoints.push(pt);
            
            if (drawType === 'linear') {
                const m = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({ color: COLOR_DRAW }));
                m.position.copy(pt);
                scene.add(m);
                drawingMarkers.push(m);
            }

            if (drawingLine) { scene.remove(drawingLine); drawingLine.geometry.dispose(); }
            drawingLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(drawingPoints), new THREE.LineBasicMaterial({ color: COLOR_DRAW, linewidth: 3 }));
            scene.add(drawingLine);
        }

        function clearDrawing() {
            drawingPoints = [];
            drawingMarkers.forEach(m => { scene.remove(m); m.geometry.dispose(); });
            drawingMarkers = [];
            if (drawingLine) { scene.remove(drawingLine); drawingLine.geometry.dispose(); drawingLine = null; }
        }

        function finishDrawing() {
            if (drawingPoints.length < 2) { alert("2개 이상의 점이 필요합니다."); return; }
            currentPoints = drawingPoints.map(p => new THREE.Vector2(Math.abs(p.x), p.y));
            
            if (currentPoints[0].distanceTo(currentPoints[currentPoints.length-1]) > 0.1) {
                currentPoints.push(currentPoints[0]);
            }
            
            toggleDrawMode();
            animateRevolution();
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            camera.aspect = width / height;
            camera.updateProjectionMatrix();
            renderer.setSize(width, height);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
